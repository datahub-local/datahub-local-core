# Kubernetes RBAC Role for Spark on Kubernetes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name:  {{ include "name" . }}-airflow-task

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "name" . }}-airflow-task-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "persistentvolumeclaims", "pods", "secrets", "services"]
    verbs: ["create", "delete", "deletecollection", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "name" . }}-airflow-task-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "name" . }}-airflow-task-role
subjects:
- kind: ServiceAccount
  name: {{ include "name" . }}-airflow-task

